global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules/alerting_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: "openmrsenger"

    metrics_path: "/actuator/prometheus"

    static_configs:
      - targets: ["rest-service:8081"]
