groups:
  - name: rest-service-alerts
    rules:
      - alert: InstanceDown
        expr: up{job="openmrsenger"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Prometheus job openmrsenger instance {{ $labels.instance }} reported down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (increase(http_server_requests_seconds_count{status=~"5.."}[5m])
           / increase(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "More than 5% of requests are 5xx in the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 95th percentile latency"
          description: "95th percentile request latency > 1s for more than 5 minutes."

      - alert: DeadLetterQueueNotEmpty
        expr: rabbitmq_queue_messages{queue="appointment.events.dlq"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Messages detected in DLQ"
          description: "Dead letter queue appointment.events.dlq has {{ $value }} messages awaiting manual intervention."

      - alert: QueueBacklogHigh
        expr: rabbitmq_queue_messages{queue="appointment.events"} > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue backlog on main queue"
          description: "Queue appointment.events has over 5000 messages for 5 minutes."

      - alert: DatabasePoolSaturation
        expr: (hikaricp_connections_active / hikaricp_connections_max) > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HikariCP database pool saturated"
          description: "Hikari connection pool is at {{ $value }} capacity for more than 2 minutes."

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Postgres exporter offline"
          description: "Postgres exporter has been down for more than 2 minutes."
