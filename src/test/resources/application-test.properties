# Database configuration for tests using H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# RabbitMQ - Disable auto-startup of listeners in tests to avoid connection errors if broker is not running
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Test-only fixture values (never used outside the test profile) - production has no fallback
webhook.secret=test-webhook-secret
app.encryption.key=hhTa0lgeWcYZ1CvUmAmAHpxbdxw4GNKD33gC8LfnswA=
