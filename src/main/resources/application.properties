spring.application.name=rest-service
server.port=8081
spring.config.import=optional:file:.env[.properties]

# SwiftSend Configuration
SWIFT_SEND_API_URL=${BASE_API_URL}/swiftsend
SWIFT_SEND_API_KEY=${SWIFT_SEND_API_KEY}
SWIFT_SEND_STUDENT_GROUP=${STUDENT_GROUP}

# AsyncFlow Configuration
ASYNC_FLOW_API_URL=${BASE_API_URL}/asyncflow
ASYNC_FLOW_API_KEY=${ASYNC_FLOW_API_KEY}
ASYNC_FLOW_STUDENT_GROUP=${STUDENT_GROUP}

# LegacyLink Configuration
legacylink.api.url=${BASE_API_URL}/legacylink/sendsms
legacylink.api.username=${LEGACY_LINK_USERNAME}
legacylink.api.password=${LEGACY_LINK_PASSWORD}
legacylink.api.student-group=${STUDENT_GROUP}

# SecurePost Configuration
BASE_API_URL=${BASE_API_URL}/securepost
SECURE_POST_CLIENT_ID=${SECURE_POST_CLIENT_ID}
SECURE_POST_CLIENT_SECRET=${SECURE_POST_CLIENT_SECRET}
STUDENT_GROUP=${STUDENT_GROUP}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:restservice_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
