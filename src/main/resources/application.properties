spring.application.name=rest-service
server.port=8081
spring.config.import=optional:file:.env[.properties]

# API Configuration
base.api.url=${BASE_API_URL}


# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:restservice_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Webhook Configuration
webhook.secret=${WEBHOOK_SECRET:my-secret-key}
student.group=${STUDENT_GROUP:Group1}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_LISTENER_AUTO_STARTUP:true}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# ACTUATOR
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# PROMETHEUS
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.access=unrestricted

# APP TAG
management.metrics.tags.application=openmrsenger-rest-service