spring.application.name=rest-service
server.port=8081
spring.config.import=optional:file:.env[.properties]

# API Configuration
base.api.url=${BASE_API_URL}


# Database Configuration
# Host/port/db-name are not secrets and keep dev-friendly defaults; credentials do not.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:restservice_db}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Webhook Configuration
# No fallback secret - app fails fast at startup if WEBHOOK_SECRET is unset/blank.
webhook.secret=${WEBHOOK_SECRET}
student.group=${STUDENT_GROUP:Group1}

# Outbox payload encryption (AES-256-GCM). Key lives outside the repo - it must come from
# the APP_ENCRYPTION_KEY environment variable / secret manager. No fallback: the app fails
# fast at startup if it is unset or not a valid Base64-encoded 32-byte (256-bit) key.
app.encryption.key=${APP_ENCRYPTION_KEY}

# RabbitMQ Configuration
# Host/port are not secrets and keep dev-friendly defaults; credentials do not.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_LISTENER_AUTO_STARTUP:true}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# ACTUATOR
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# PROMETHEUS
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.access=unrestricted
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# APP TAG
management.metrics.tags.application=openmrsenger-rest-service

# DATA RETENTION (GDPR)
retention.cleanup.cron=${RETENTION_CLEANUP_CRON:0 0 2 * * *}
retention.identifiable-data.days=${RETENTION_IDENTIFIABLE_DATA_DAYS:14}
retention.meta-information.days=${RETENTION_META_INFORMATION_DAYS:365}