services:

  fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    ports:
      - "1337:8080"

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    depends_on:
      - fakecomworld

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    depends_on:
      - postgres
      - fakecomworld
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest-service:
    build: .
    ports:
      - "8888:8081"
    environment:
      - BASE_API_URL=http://host.docker.internal:1337
      - STUDENT_GROUP=${STUDENT_GROUP}
      - SWIFT_SEND_API_KEY=${SWIFT_SEND_API_KEY}
      - ASYNC_FLOW_API_KEY=${ASYNC_FLOW_API_KEY}
      - SECURE_POST_CLIENT_ID=${SECURE_POST_CLIENT_ID}
      - SECURE_POST_CLIENT_SECRET=${SECURE_POST_CLIENT_SECRET}
      - LEGACY_LINK_USERNAME=${LEGACY_LINK_USERNAME}
      - LEGACY_LINK_PASSWORD=${LEGACY_LINK_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    depends_on:
      fakecomworld:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
